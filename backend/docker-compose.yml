version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: mongodb_crime_hotspot
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=adminpassword
      - MONGO_INITDB_DATABASE=crime_hotspot_db
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
